name: E2E Tests (Playwright)

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

env:
  # URL base del servidor de staging para los tests E2E
  PLAYWRIGHT_BASE_URL: ${{ secrets.STAGING_URL || 'http://localhost:3000' }}

jobs:
  test-e2e:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar navegadores Playwright
        run: npx playwright install --with-deps chromium

      - name: Correr tests E2E
        run: npm run test:e2e:ci
        env:
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_FUNCIONARIO_EMAIL: ${{ secrets.E2E_FUNCIONARIO_EMAIL }}
          E2E_FUNCIONARIO_PASSWORD: ${{ secrets.E2E_FUNCIONARIO_PASSWORD }}
          PLAYWRIGHT_BASE_URL: ${{ env.PLAYWRIGHT_BASE_URL }}

      - name: Subir reporte HTML de Playwright
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Subir capturas de pantalla de fallos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots
          path: test-results/
          retention-days: 7
